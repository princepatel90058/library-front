<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Warden Dashboard — Manage, review and resolve hostel complaints efficiently." />
  <title>Library Head — LibraryCare</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <!-- Background Blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <div class="logo">🏠 Library <span>| Libraryne Panel</span></div>
      <div class="nav-links">
        <div class="user-badge">
          <span class="user-avatar" id="adminAvatar">L</span>
          <span id="adminName">Library</span>
          <span class="role-tag" style="background:var(--accent)">Admin</span>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </div>
  </nav>

  <!-- Dashboard -->
  <div class="container dashboard fade-in">

    <!-- Welcome Banner -->
    <div class="welcome-banner glass-card" id="welcomeBanner">
      <div class="welcome-text">
        <h2>Welcome back, <span id="welcomeName">Library</span> 👋</h2>
        <p>Here's an overview of today's Library complaint activity.</p>
      </div>
      <div class="welcome-date">
        <div class="date-display" id="currentDate"></div>
        <div class="time-display" id="currentTime"></div>
      </div>
    </div>

    <!-- Stats Cards -->
    <div class="stats-row" id="statsRow">
      <div class="glass-card stat-card stat-total" onclick="filterFromStat('')">
        <div class="stat-icon">📊</div>
        <div class="stat-info">
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-label">Total Complaints</div>
        </div>
      </div>
      <div class="glass-card stat-card stat-pending" onclick="filterFromStat('pending')">
        <div class="stat-icon">⏳</div>
        <div class="stat-info">
          <div class="stat-value" id="statPending">0</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-bar"><div class="stat-bar-fill pending-fill" id="pendingBar"></div></div>
      </div>
      <div class="glass-card stat-card stat-progress" onclick="filterFromStat('in-progress')">
        <div class="stat-icon">🔧</div>
        <div class="stat-info">
          <div class="stat-value" id="statProgress">0</div>
          <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-bar"><div class="stat-bar-fill progress-fill" id="progressBar"></div></div>
      </div>
      <div class="glass-card stat-card stat-resolved" onclick="filterFromStat('resolved')">
        <div class="stat-icon">✅</div>
        <div class="stat-info">
          <div class="stat-value" id="statResolved">0</div>
          <div class="stat-label">Resolved</div>
        </div>
        <div class="stat-bar"><div class="stat-bar-fill resolved-fill" id="resolvedBar"></div></div>
      </div>
    </div>

    <!-- Toolbar: Header + Search + Filters -->
    <div class="toolbar glass-card">
      <div class="toolbar-top">
        <div class="toolbar-title">
          <h1>All Complaints</h1>
          <p class="subtitle">Review, update, and manage student complaints</p>
        </div>
        <div class="toolbar-search">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search complaints..." oninput="handleSearch()" />
        </div>
      </div>
      <div class="toolbar-filters">
        <div class="filter-bar" id="filterBar">
          <button class="filter-btn active" onclick="filterComplaints(this, '')">All</button>
          <button class="filter-btn" onclick="filterComplaints(this, 'pending')">🟡 Pending</button>
          <button class="filter-btn" onclick="filterComplaints(this, 'in-progress')">🔵 In Progress</button>
          <button class="filter-btn" onclick="filterComplaints(this, 'resolved')">🟢 Resolved</button>
        </div>
        <div class="sort-control">
          <label for="sortSelect">Sort:</label>
          <select id="sortSelect" onchange="handleSort()">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="title">A → Z</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Complaint Cards -->
    <div class="complaints-grid" id="complaintsGrid">
      <div class="loading-overlay"><span class="spinner" style="width:36px;height:36px;border-width:3px"></span></div>
    </div>

    <!-- Results Count -->
    <div class="results-info" id="resultsInfo"></div>
  </div>

  <!-- Complaint Detail Modal -->
  <div class="modal-overlay hidden" id="detailModal" onclick="closeDetailModal(event)">
    <div class="glass-card modal modal-lg" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>Complaint Details</h2>
        <button class="btn btn-ghost btn-icon" onclick="closeDetailModalBtn()">✕</button>
      </div>
      <div class="modal-body" id="detailBody">
        <!-- Filled dynamically -->
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
